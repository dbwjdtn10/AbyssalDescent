version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://abyssal:abyssal_secret@postgres:5432/abyssal_descent
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: abyssal
      POSTGRES_PASSWORD: abyssal_secret
      POSTGRES_DB: abyssal_descent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abyssal -d abyssal_descent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  chroma_data:
